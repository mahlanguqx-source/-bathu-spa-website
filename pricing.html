<!DOCTYPE html>
<html lang="en" class="page">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Pricing — Bathu Spa</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body class="page-body" data-page="pricing">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="nav"><div class="container nav__inner"><a href="/" class="nav__brand"><img src="assets/logo.svg" alt="Bathu Spa" width="32" height="32"/><span>Bathu Spa</span></a><nav class="nav__links"><a href="/services.html">Services</a><a href="/pricing.html">Pricing</a></nav><a class="btn btn--gold nav__cta" target="_blank" rel="noopener" href="https://wa.me/27790834264">Book</a><button class="nav__burger" aria-label="Menu"><span></span><span></span><span></span></button></div></header>
  <main id="main" class="section"><div class="container">
    <header class="section__head"><h1 class="title">Pricing</h1><p class="muted">Transparent. Minimal. Premium options.</p></header>
    <div id="tiers" class="grid pricing"></div>
    <section class="section"><div class="container"><h2 class="title">Add‑ons & Extras</h2><div id="addons" class="grid pricing"></div></div></section>
    <p class="center" style="margin-top:24px"><a class="btn btn--ghost" href="index.html">Back to Home</a></p>
  </div></main>
  <script>
    const tiersEl = document.getElementById('tiers');
    const addonsEl = document.getElementById('addons');
    fetch('data/pricing.json').then(r=>r.json()).then(d=>{
      tiersEl.innerHTML = d.tiers.map(t=>{
        const features = t.features.map(f=>`<li>${f}</li>`).join('');
        const cta = t.type === 'gold'
          ? `<a class="btn btn--gold" target="_blank" rel="noopener" href="https://wa.me/27790834264?text=${encodeURIComponent(t.wa_text || (t.name + ' booking'))}">${t.cta}</a>`
          : `<a class="btn btn--ghost" href="services.html">${t.cta}</a>`;
        return `<section class="pricecard reveal"><h2>${t.name}</h2><p class="price">From <strong>${t.from}</strong></p><ul class="list">${features}</ul>${cta}</section>`;
      }).join('');
      addonsEl.innerHTML = d.addons.map(a=>`<div class="pricecard reveal"><h3>${a.name}</h3><p class="price"><strong>${a.price}</strong></p><p class="muted">${a.desc}</p></div>`).join('');
    });
  </script>
</body></html>
